<style>
  /* ── Variables ── */
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e42;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text-muted: #888899;
    --chord: #f59e0b;
    --chord-hover: #fbbf24;
    --radius: 12px;
    --font-mono: 'Courier New', Courier, monospace;
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.02em;
  }

  .sidebar-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .sidebar-search {
    margin: 12px 16px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    width: calc(100% - 32px);
    transition: border-color 0.2s;
  }
  .sidebar-search:focus { border-color: var(--accent); }
  .sidebar-search::placeholder { color: var(--text-muted); }

  .song-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  .song-list::-webkit-scrollbar { width: 4px; }
  .song-list::-webkit-scrollbar-track { background: transparent; }
  .song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .song-item {
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .song-item:hover { background: var(--surface2); }
  .song-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .song-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-item-artist {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 12px;
    padding: 40px;
  }
  .welcome-icon { font-size: 64px; opacity: 0.3; }
  .welcome-text { font-size: 18px; font-weight: 600; color: var(--text); opacity: 0.5; }

  /* Song view */
  .song-view {
    display: none;
    flex-direction: column;
    min-height: 100%;
  }
  .song-view.visible { display: flex; }

  .song-header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .song-title {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }

  .song-artist {
    font-size: 14px;
    color: var(--accent2);
    margin-top: 4px;
    font-weight: 500;
  }

  .song-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .key-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .key-badge span { color: var(--chord); font-weight: 700; font-size: 15px; }

  .transpose-group {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .transpose-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 6px 14px;
    font-size: 18px;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }
  .transpose-btn:hover { background: var(--accent); color: #fff; }

  .transpose-display {
    padding: 6px 10px;
    font-size: 13px;
    color: var(--text-muted);
    min-width: 60px;
    text-align: center;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px 12px;
    font-size: 12px;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent2); }

  .print-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s;
    margin-left: auto;
  }
  .print-btn:hover { background: var(--accent2); }

  /* Capo notice */
  .capo-notice {
    margin: 0 40px;
    margin-top: 16px;
    padding: 8px 14px;
    background: #1e1a0e;
    border: 1px solid #3d3010;
    border-radius: 8px;
    font-size: 13px;
    color: #f59e0b99;
    display: none;
  }
  .capo-notice.show { display: block; }

  /* Song body */
  .song-body {
    padding: 24px 40px 60px;
    flex: 1;
  }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-top: 32px;
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .section-label:first-child { margin-top: 0; }

  /* Chord+lyric lines */
  .song-content {
    font-family: var(--font-mono);
    font-size: 15px;
    line-height: 1;
    white-space: pre;
  }

  .line-block {
    display: block;
    margin-bottom: 2px;
  }

  .chord-line {
    color: var(--chord);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    display: block;
    white-space: pre;
  }

  .lyric-line {
    color: var(--text);
    display: block;
    white-space: pre;
    line-height: 1.7;
  }

  .empty-line {
    display: block;
    height: 12px;
  }

  /* ── Print ── */
  @media print {
    body { background: #fff !important; color: #000 !important; }
    .sidebar, .song-header .transpose-group,
    .song-header .reset-btn,
    .song-header .print-btn { display: none !important; }
    .app { display: block; }
    .main { overflow: visible; }
    .song-view { display: flex !important; }
    .welcome { display: none !important; }
    .song-header {
      position: static;
      background: #fff;
      border-bottom: 2px solid #000;
      padding: 16px 24px;
    }
    .song-title { color: #000; font-size: 22px; }
    .song-artist { color: #444; }
    .key-badge { border-color: #ccc; color: #444; }
    .key-badge span { color: #b45309; }
    .song-body { padding: 16px 24px 32px; }
    .section-label { color: #7c3aed; }
    .chord-line { color: #b45309 !important; }
    .lyric-line { color: #000 !important; }
    .capo-notice { color: #92400e; border-color: #fbbf24; background: #fffbeb; display: block; margin: 8px 24px; }
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sidebar { width: 100%; position: fixed; bottom: 0; height: auto; max-height: 50vh; top: auto; left: 0; right: 0; border-right: none; border-top: 1px solid var(--border); z-index: 100; }
    .app { flex-direction: column; }
    .song-header { padding: 20px 16px 16px; }
    .song-body { padding: 16px 16px 80px; }
    .capo-notice { margin: 0 16px; margin-top: 12px; }
    .print-btn { display: none; }
  }
</style>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">✝ RiseUp 2026</div>

    <div class="song-list" id="songList"></div>

  <main class="main" id="mainArea">

        <div class="song-title" id="viewTitle"></div>
        <div class="song-artist" id="viewArtist"></div>

          <div class="key-badge">Tono original: <span id="viewKey"></span></div>
          <div class="transpose-group">
            <button class="transpose-btn" onclick="transpose(-1)" title="Bajar semitono">−</button>
            <div class="transpose-display" id="transposeDisplay">Original</div>
            <button class="transpose-btn" onclick="transpose(+1)" title="Subir semitono">+</button>
          </div>
          <button class="reset-btn" onclick="resetTranspose()">↺ Reset</button>
          <button class="print-btn" onclick="window.print()">🖨 Imprimir</button>

<script>
// ══════════════════════════════════════════════
//  TRANSPOSITION ENGINE
// ══════════════════════════════════════════════

const SHARPS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLATS  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

const ENHARMONIC = {
  'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#',
  'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'
};

function noteIndex(note) {
  let idx = SHARPS.indexOf(note);
  if (idx === -1) idx = FLATS.indexOf(note);
  return idx;
}

// Always use sharps
const FLAT_KEYS = [];

function transposeNote(note, semitones, preferFlats) {
  const idx = noteIndex(note);
  if (idx === -1) return note;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;
  return preferFlats ? FLATS[newIdx] : SHARPS[newIdx];
}

// Matches chord symbols like: C, Cm, C#, Db, Cmaj7, C/E, G#m7, etc.
const CHORD_RE = /\b([A-G][b#]?)((?:maj|min|m|sus|add|aug|dim|M)?[0-9]?(?:maj|min|m|sus|add|aug|dim)?[0-9]?)((?:\/[A-G][b#]?)?)\b/g;

function transposeChordLine(line, semitones, preferFlats) {
  return line.replace(CHORD_RE, (match, root, qual, bass) => {
    const newRoot = transposeNote(root, semitones, preferFlats);
    let newBass = bass;
    if (bass && bass.length > 1) {
      const bassNote = bass.slice(1);
      newBass = '/' + transposeNote(bassNote, semitones, preferFlats);
    }
    return newRoot + qual + newBass;
  });
}

function getTransposedKey(originalKey, semitones) {
  if (!originalKey) return '';
  const cleaned = originalKey.replace(/[()]/g,'').trim();
  const idx = noteIndex(cleaned);
  if (idx === -1) return originalKey;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;
  const pref = FLAT_KEYS.includes(cleaned);
  return pref ? FLATS[newIdx] : SHARPS[newIdx];
}

// ══════════════════════════════════════════════
//  CHORD-LINE DETECTION
// ══════════════════════════════════════════════

function isChordLine(line) {
  // A line is a chord line if it contains mostly chord tokens and spaces
  const trimmed = line.trim();
  if (!trimmed) return false;
  // Remove all valid chord patterns and separators
  const stripped = trimmed.replace(CHORD_RE, '').replace(/[-–,/\s|()x[\]#*.\\]+/g, '');
  // If very little remains, it's a chord line
  return stripped.length <= Math.max(2, trimmed.length * 0.15);
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════

let currentSongIdx = null;
let currentSemitones = 0;

function renderSong(idx, semitones) {
  const song = SONGS[idx];
  document.getElementById('viewTitle').textContent = song.title;
  document.getElementById('viewArtist').textContent = song.artist;
  document.getElementById('viewKey').textContent = song.key || '—';

  // Transpose display
  const disp = document.getElementById('transposeDisplay');
  if (semitones === 0) {
    disp.textContent = 'Original';
  } else {
    const sign = semitones > 0 ? '+' : '';
    const newKey = getTransposedKey(song.key, semitones);
    disp.textContent = sign + semitones + (newKey ? ' (' + newKey + ')' : '');
  }

  // Capo
  const capoEl = document.getElementById('capoNotice');
  if (song.capo) {
    capoEl.textContent = '🎸 ' + song.capo;
    capoEl.classList.add('show');
  } else {
    capoEl.textContent = '';
    capoEl.classList.remove('show');
  }

  const preferFlats = false;
  const body = document.getElementById('songBody');
  body.innerHTML = '';

  const lines = song.content.split('\n');
  let i = 0;
  while (i < lines.length) {
    const raw = lines[i];
    const trimmed = raw.trim();

    // Section label: [Verso], [Coro], etc.
    if (/^\[.+\]$/.test(trimmed)) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = trimmed.slice(1, -1);
      body.appendChild(lbl);
      i++;
      continue;
    }

    // Empty line
    if (!trimmed) {
      const emp = document.createElement('span');
      emp.className = 'empty-line';
      body.appendChild(emp);
      i++;
      continue;
    }

    // Chord line: look ahead for a lyric line
    if (isChordLine(raw)) {
      const chordRaw = raw;
      const lyricRaw = (i + 1 < lines.length && !isChordLine(lines[i+1]) && lines[i+1].trim() !== '' && !/^\[.+\]$/.test(lines[i+1].trim()))
        ? lines[i+1] : null;

      const chordTransposed = transposeChordLine(chordRaw, semitones, preferFlats);

      const block = document.createElement('span');
      block.className = 'line-block';

      const cl = document.createElement('span');
      cl.className = 'chord-line';
      cl.textContent = chordTransposed;
      block.appendChild(cl);

      if (lyricRaw !== null) {
        const ll = document.createElement('span');
        ll.className = 'lyric-line';
        ll.textContent = lyricRaw;
        block.appendChild(ll);
        i += 2;
      } else {
        i++;
      }

      body.appendChild(block);
      continue;
    }

    // Plain lyric line
    const ll = document.createElement('span');
    ll.className = 'lyric-line';
    ll.textContent = raw;
    body.appendChild(ll);
    i++;
  }
}

function showSong(idx) {
  currentSongIdx = idx;
  currentSemitones = 0;

  // Update sidebar active
  document.querySelectorAll('.song-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  document.getElementById('welcomeScreen').style.display = 'none';
  const sv = document.getElementById('songView');
  sv.classList.add('visible');

  renderSong(idx, 0);

  // Scroll main to top
  document.getElementById('mainArea').scrollTo(0, 0);
}

function transpose(delta) {
  if (currentSongIdx === null) return;
  currentSemitones += delta;
  renderSong(currentSongIdx, currentSemitones);
}

function resetTranspose() {
  if (currentSongIdx === null) return;
  currentSemitones = 0;
  renderSong(currentSongIdx, 0);
}

// ══════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════

function buildSongList(filter) {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  SONGS.forEach((s, i) => {
    if (filter && !s.title.toLowerCase().includes(filter.toLowerCase()) && !s.artist.toLowerCase().includes(filter.toLowerCase())) return;
    const el = document.createElement('div');
    el.className = 'song-item' + (i === currentSongIdx ? ' active' : '');
    el.innerHTML = `<div class="song-item-title">${s.title}</div><div class="song-item-artist">${s.artist}</div>`;
    el.onclick = () => showSong(i);
    list.appendChild(el);
  });
}

function filterSongs(val) {
  buildSongList(val);
}
